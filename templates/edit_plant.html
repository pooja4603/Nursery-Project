<!DOCTYPE html>
<html>
<head>
    <title>Edit Plant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">✏️ Edit Plant</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label">Plant Name</label>
                        <input type="text" name="name" class="form-control" value="{{ plant.name }}" required>
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>

                            <option value="Indoor" {% if plant.category == "Indoor" %}selected{% endif %}>Indoor</option>
                            <option value="Outdoor" {% if plant.category == "Outdoor" %}selected{% endif %}>Outdoor</option>
                            <option value="Medicinal" {% if plant.category == "Medicinal" %}selected{% endif %}>Medicinal</option>
                            <option value="Flowering" {% if plant.category == "Flowering" %}selected{% endif %}>Flowering</option>

                        </select>
                    </div>

                    <!-- Price -->
                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" name="price" class="form-control" value="{{ plant.price }}" required>
                    </div>

                    <!-- Quantity -->
                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" value="{{ plant.quantity }}" required>
                    </div>

                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary w-100">
                        Update Plant
                    </button>

                    <a href="{% url 'plant_list' %}" class="btn btn-secondary w-100 mt-2">
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
