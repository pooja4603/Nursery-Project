<!DOCTYPE html>
<html>
<head>
    <title>Plant List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- 🌿 Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h1>🌿 Plant List</h1>

        <a href="{% url 'add_plant' %}" class="btn btn-success">
            + Add Plant
        </a>

    </div>

    <!-- 🔍 Search -->
    <form method="GET" class="mb-3">
        <input type="text" name="search" class="form-control" placeholder="Search plant...">
    </form>

    {% if plants %}

    <!-- 📋 Table -->
    <table class="table table-bordered table-striped shadow">
        <thead class="table-success">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for plant in plants %}
            <tr>
                <td>{{ plant.name }}</td>
                <td>{{ plant.category }}</td>
                <td>₹{{ plant.price }}</td>
                <td>{{ plant.quantity }}</td>

                <!-- ✏️ Actions -->
                <td>
                    <a href="{% url 'edit_plant' plant.id %}" class="btn btn-primary btn-sm">
                        Edit
                    </a>

                    <a href="{% url 'delete_plant' plant.id %}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?')">
                        Delete
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

    {% else %}

    <!-- ⚠️ No data -->
    <div class="alert alert-warning text-center">
        No plants available
    </div>

    {% endif %}

</div>

</body>
</html>
